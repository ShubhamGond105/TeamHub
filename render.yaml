databases:
  - name: teamhub-db
    databaseName: teamhub
    user: teamhub_user

services:
  - type: web
    name: teamhub
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: teamhub-db
          property: connectionString
