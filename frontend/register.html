<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your TeamHub account">
    <title>Register | TeamHub</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo">
                <h1>TeamHub</h1>
                <p>Create your account to get started</p>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="role">Account Role</label>
                    <select id="role">
                        <option value="member">Team Member (Join Projects)</option>
                        <option value="admin">System Admin (Create Projects)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="registerBtn">Create Account</button>
            </form>
            <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--text-secondary)">
                Already have an account? <a href="/login.html" style="color:var(--accent-light);text-decoration:none;font-weight:600">Sign In</a>
            </p>
        </div>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        redirectIfLoggedIn();
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            try {
                const data = await api.post('/auth/register', {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    role: document.getElementById('role').value
                });
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/index.html';
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
